name: Data Pipelines Optimized

on:
  schedule:
    - cron: "0 5 * * *" # Gira ogni mattina alle 5:00
  workflow_dispatch:   # Ti permette di lanciarlo a mano

env:
  PY_DEPS: "requests pandas pyarrow huggingface_hub"
  # CONFIGURA QUI: Sostituisci TUO_USER con il tuo nome reale di Hugging Face
  USER: "GabrieleCorsoIT" 

jobs:
  run-all-pipelines:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      
      - name: Install Dependencies
        run: pip install -q ${{ env.PY_DEPS }}

      - name: Execute Pipelines
        env:
          # Questi devono rimanere riferimenti ai SECRETS (non incollare le chiavi qui!)
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          
          # Mappatura dei repo (Qui puoi scrivere i nomi direttamente)
          HF_REPO_WEATHER: "${{ env.USER }}/italy-weather"
          HF_REPO_ENERGY: "${{ env.USER }}/italy-energy"
          HF_REPO_AIR: "${{ env.USER }}/italy-air"
          HF_REPO_SEISMIC: "${{ env.USER }}/italy-seismic"
          HF_REPO_POI: "${{ env.USER }}/italy-poi"
          HF_REPO_RENEWABLES: "${{ env.USER }}/italy-renewables"
          HF_REPO_FUEL: "${{ env.USER }}/italy-fuel"
          HF_REPO_AI_TEXT: "${{ env.USER }}/italian-ai-corpus"
        run: |
          echo "Avvio sequenza pipeline..."
          python pipelines/01_noaa_weather.py || echo "Errore 01"
          python pipelines/02_gme_energy.py || echo "Errore 02"
          python pipelines/03_eea_air_quality.py || echo "Errore 03"
          python pipelines/04_ingv_seismic.py || echo "Errore 04"
          python pipelines/05_osm_poi.py || echo "Errore 05"
          python pipelines/06_terna_renewables.py || echo "Errore 06"
          python pipelines/07_mase_fuel_prices.py || echo "Errore 07"
          python pipelines/08_italian_ai_corpus.py || echo "Errore 08"
